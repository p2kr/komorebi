####################################################################################################################
# WARNING: Do not store sensitive information in this file, as its contents will be included in the Qodana report. #
####################################################################################################################
version: "1.0"
profile:
  name: qodana.starter
bootstrap: |
  flutter pub get
plugins:
  - id: org.jetbrains.plugins.dart
  - id: io.flutter
exclude:
  - name: All
    paths:
      - .dart_tool
      - build
      - lib/intl/generated
      - "**/*.g.dart"
      - "**/*.freezed.dart"
