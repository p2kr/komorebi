name: Deploy Web to GitHub Pages

on:
  push:
    branches: [ "master" ]
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    name: 🌐 Build Web
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🐦 Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: 💾 Cache Pub & Build Runner
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
            .dart_tool/build
          key: ${{ runner.os }}-pub-${{ hashFiles('**/pubspec.lock') }}-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-pub-${{ hashFiles('**/pubspec.lock') }}-
            ${{ runner.os }}-pub-

      - name: ⚙️ Enable Web Support
        run: flutter config --enable-web

      - name: ⚙️ Setup GitHub Pages
        uses: actions/configure-pages@v5

      - name: 📦 Install dependencies
        run: flutter pub get

      - name: ⚙️ Generate Drift Database Schemas (build_runner)
        run: dart run build_runner build

      - name: 🌐 Generate Localization Files (intl_utils)
        run: dart run intl_utils:generate

      - name: 🏗️ Build Web Release Bundle
        # Note: By default, GitHub Pages serves project repositories at https://<user>.github.io/<repo-name>/
        # Passing --base-href "/${{ github.event.repository.name }}/" ensures routing and assets work correctly.
        # If you are using a custom domain or a user/organization root site (<user>.github.io), remove --base-href or set it to "/".
        run: flutter build web --release --base-href "/${{ github.event.repository.name }}/"

      - name: 📤 Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/web

  deploy:
    name: 🚀 Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: 🚀 Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
