name: Flutter CI/CD (Windows & Web)

on:
  push:
    branches: [ "develop", "master" ]
  pull_request:
    branches: [ "develop", "master" ]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write
  pages: write
  id-token: write

jobs:
  test_and_build_web:
    name: 🔍 Test & 🌐 Build Web
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🐦 Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: 💾 Cache Pub & Build Runner (Linux)
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
            .dart_tool/build
          key: ${{ runner.os }}-pub-${{ hashFiles('**/pubspec.lock') }}-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-pub-${{ hashFiles('**/pubspec.lock') }}-
            ${{ runner.os }}-pub-

      - name: ⚙️ Enable Web Support
        run: flutter config --enable-web

      - name: ⚙️ Setup GitHub Pages
        if: github.ref == 'refs/heads/master' && github.event_name != 'pull_request'
        uses: actions/configure-pages@v5

      - name: 📦 Install dependencies
        run: flutter pub get

      - name: ⚙️ Generate Drift Database Schemas (build_runner)
        run: dart run build_runner build

      - name: 🌐 Generate Localization Files (intl_utils)
        run: dart run intl_utils:generate

      - name: 🔎 Verify Formatting
        run: dart format --output=none --set-exit-if-changed .
        continue-on-error: true

      - name: 🧪 Run Static Analysis
        run: flutter analyze

      - name: 🧪 Run Unit Tests with Coverage
        run: flutter test --coverage

      - name: 🧹 Filter Generated Files from Coverage
        run: |
          sudo apt-get update && sudo apt-get install -y lcov
          lcov --remove coverage/lcov.info 'lib/**/*.g.dart' 'lib/intl/generated/*' -o coverage/lcov.info --ignore-errors unused
        continue-on-error: true

      - name: 📊 Report Test Coverage to PR
        if: github.event_name == 'pull_request'
        uses: zgosalvez/github-actions-report-lcov@v4
        with:
          coverage-files: coverage/lcov.info
          minimum-coverage: 0
          artifact-name: komorebi-code-coverage-report
          github-token: ${{ secrets.GITHUB_TOKEN }}
          update-comment: true

      - name: 📤 Upload Coverage Artifact
        uses: actions/upload-artifact@v4
        with:
          name: komorebi-coverage-report
          path: coverage/
          if-no-files-found: ignore

      - name: 🏗️ Build Web Release Bundle
        # Note: By default, GitHub Pages serves project repositories at https://<user>.github.io/<repo-name>/
        # Passing --base-href "/${{ github.event.repository.name }}/" ensures routing and assets work correctly.
        # If you are using a custom domain or a user/organization root site (<user>.github.io), remove --base-href or set it to "/".
        run: flutter build web --release --base-href "/${{ github.event.repository.name }}/"

      - name: 📤 Upload Web Artifacts (CI)
        uses: actions/upload-artifact@v4
        with:
          name: komorebi-web-build
          path: build/web
          if-no-files-found: error

      - name: 📤 Upload Pages Artifact (CD)
        if: github.ref == 'refs/heads/master' && github.event_name != 'pull_request'
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/web

  build_windows:
    name: 🖥️ Build Windows Desktop
    runs-on: windows-latest
    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🐦 Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: 💾 Cache Pub & Build Runner (Windows)
        uses: actions/cache@v4
        with:
          path: |
            C:\Users\runneradmin\AppData\Local\Pub\Cache
            .dart_tool\build
          key: ${{ runner.os }}-pub-${{ hashFiles('**/pubspec.lock') }}-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-pub-${{ hashFiles('**/pubspec.lock') }}-
            ${{ runner.os }}-pub-

      - name: ⚙️ Enable Windows Desktop Support
        run: flutter config --enable-windows-desktop

      - name: 📦 Install dependencies
        run: flutter pub get

      - name: ⚙️ Generate Drift Database Schemas (build_runner)
        run: dart run build_runner build

      - name: 🌐 Generate Localization Files (intl_utils)
        run: dart run intl_utils:generate

      - name: 🏗️ Build Windows Release Bundle
        run: flutter build windows --release

      - name: 📤 Upload Windows Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: komorebi-windows-build
          path: build/windows/x64/runner/Release/
          if-no-files-found: error

  deploy_web:
    name: 🚀 Deploy Web to GitHub Pages
    needs: test_and_build_web
    if: github.ref == 'refs/heads/master' && github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: 🚀 Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
