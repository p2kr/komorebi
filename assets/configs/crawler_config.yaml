# Komorebi Crawler Site Configurations
# This file contains the default scraper profiles used by the parallel web crawler.

# Configs:
# {title} - title of anime/manga
# {number} - episode/chapter of anime/manga

nyaa:
  name: "Nyaa.si Anime Torrents"
  base_url: "https://nyaa.si/?page=rss&q={title}+{number}&c=1_2&f=0"
  item_selector: "item"
  title_selector: "title"
  link_selector: "link"
  is_active: true

animetosho:
  name: "AnimeTosho Torrents"
  base_url: "https://animetosho.org/search?q={title}+{number}"
  item_selector: "div.home_list_entry"
  title_selector: "div.link a"
  link_selector: "a[href^='magnet:']"
  is_active: true

tokyotosho:
  name: "Tokyo Toshokan"
  base_url: "https://tokyotosho.info/search.php?terms={title}+{number}"
  item_selector: "table.listing tr.main"
  title_selector: "td.desc-top a:not([website])"
  link_selector: "a[href^='magnet:']"
  is_active: true

subsplease:
  name: "SubsPlease RSS"
  base_url: "https://subsplease.org/rss/?r=1080"
  item_selector: "item"
  title_selector: "title"
  link_selector: "link"
  is_active: true

erairaws:
  name: "Erai-raws RSS"
  base_url: "https://www.erai-raws.info/rss-1080p/"
  item_selector: "item"
  title_selector: "title"
  link_selector: "link"
  is_active: true
