name: komorebi
description: "An all in one app to consume manga and anime from MyAnimeList"

publish_to: "none" # Remove this line if you wish to publish to pub.dev

version: 1.0.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8
  google_fonts: ^8.1.0
  flutter_riverpod: ^3.3.2
  drift: ^2.34.0
  drift_flutter: ^0.3.0
  path_provider: ^2.1.6
  path: ^1.9.1
  html: ^0.15.6
  intl: any
  window_manager: ^0.5.1
  talker: ^5.1.17
  flutter_hooks: ^0.21.3+1
  dio: ^5.10.0
  hooks_riverpod: ^3.3.2
  cached_network_image: ^3.4.1
  talker_riverpod_logger: ^5.1.17
  talker_dio_logger: ^5.1.17
  flutter_web_auth_2: ^5.0.3
  envied: ^1.3.8
  url_launcher: ^6.3.0
  app_links: ^7.2.0
  protocol_handler: ^0.2.0
  windows_single_instance: ^1.1.0
  go_router: ^17.3.0
  freezed_annotation: ^3.1.0
  gradient_borders: ^1.0.4
  animated_tree_view: ^2.3.0
  popover: ^0.4.0
  flutter_localized_locales: ^2.0.5
  json_annotation: ^4.12.0
  riverpod_annotation: ^4.0.3
dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  drift_dev: ^2.34.0
  build_runner: ^2.15.0
  intl_utils: any
  envied_generator: ^1.3.8
  freezed: ^3.2.5
  mocktail: ^1.0.5
  json_serializable: ^6.14.0
  riverpod_generator: ^4.0.4

flutter:
  uses-material-design: true

  assets:
    - assets/
    - assets/fonts/
    - assets/icons/
    - assets/images/

  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-VariableFont_opsz,wght.ttf
        - asset: assets/fonts/Inter-Italic-VariableFont_opsz,wght.ttf
          style: italic
    - family: JetBrains Mono
      fonts:
        - asset: assets/fonts/JetBrainsMono-VariableFont_wght.ttf
        - asset: assets/fonts/JetBrainsMono-Italic-VariableFont_wght.ttf
          style: italic
    - family: Playfair Display
      fonts:
        - asset: assets/fonts/PlayfairDisplay-VariableFont_wght.ttf
        - asset: assets/fonts/PlayfairDisplay-Italic-VariableFont_wght.ttf
          style: italic

flutter_intl:
  enabled: true
  class_name: "S"
  arb_dir: lib/intl/arb
  output_dir: lib/intl/generated
  use_deferred_loading: true
